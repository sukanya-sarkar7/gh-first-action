name: Test Workflow
on: push
jobs:
   test: 
      runs-on: ubuntu-latest
      steps:  
        - name: Get code
          uses: actions/checkout@v6  
        - name: Install NodeJS
          uses: actions/setup-node@v6
          with:
            node-version: 24
        - name: Install dependencies
          run: npm ci
          working-directory: ./02 Starting Project
        - name: Run tests
          run: npm test
          working-directory: ./02 Starting Project   
   deploy: 
      needs: test
      runs-on: ubuntu-latest
      steps:  
        - name: Get code
          uses: actions/checkout@v6  
        - name: Install NodeJS
          uses: actions/setup-node@v6
          with:
            node-version: 24
        - name: Install dependencies
          run: npm ci
          working-directory: ./02 Starting Project
        - name: Run tests
          run: npm test
          working-directory: ./02 Starting Project
        - name: Build project
          run: npm run build
          working-directory: ./02 Starting Project
        - name: Deploy
          run: echo "Deploying ..."
